<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthFlow - 现代 SaaS 认证页面</title>
<link rel="stylesheet" href="/tokens/tokens.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: var(--font-sans); 
  color: var(--color-text); 
  background: var(--color-bg); 
  min-height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 400px;
  background: var(--color-bg-subtle);
  padding: 3rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-right: 1px solid var(--color-border);
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 3rem;
}
.sidebar-logo svg {
  width: 32px;
  height: 32px;
}
.auth-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  padding: 2.5rem;
  box-shadow: var(--shadow-xl);
  border: 1px solid var(--color-border);
}
.auth-header {
  text-align: center;
  margin-bottom: 2rem;
}
.auth-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.auth-header p {
  color: var(--color-text-secondary);
  font-size: 0.95rem;
}
.form-group {
  margin-bottom: 1.25rem;
}
.form-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-bottom: 0.5rem;
}
.form-input {
  width: 100%;
  padding: 0.875rem 1rem;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 1rem;
  transition: all 0.2s;
  background: var(--color-bg);
}
.form-input:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-ghost);
}
.form-input::placeholder {
  color: var(--color-text-muted);
}
.btn-primary {
  width: 100%;
  padding: 0.875rem;
  background: var(--color-primary);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 0.5rem;
}
.btn-primary:hover {
  background: var(--color-primary-dark);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: var(--color-text-muted);
  font-size: 0.875rem;
}
.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}
.divider span {
  padding: 0 1rem;
}
.social-buttons {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.btn-social {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  padding: 0.875rem;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-social:hover {
  background: var(--color-bg-subtle);
  border-color: var(--color-border-hover);
}
.btn-social svg {
  width: 20px;
  height: 20px;
}
.auth-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.9rem;
  color: var(--color-text-secondary);
}
.auth-footer a {
  color: var(--color-primary);
  text-decoration: none;
  font-weight: 500;
}
.auth-footer a:hover {
  text-decoration: underline;
}

/* Preview Area */
.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 3rem;
  background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
}
.preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
}
.preview-title {
  font-size: 1.25rem;
  font-weight: 600;
}
.preview-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  background: rgba(99,102,241,0.1);
  color: var(--color-primary);
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 600;
}
.preview-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}
.feature-showcase {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  padding: 2rem;
  box-shadow: var(--shadow-lg);
}
.feature-showcase h3 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.feature-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 1rem;
  background: var(--color-bg-subtle);
  border-radius: var(--radius-md);
}
.feature-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.25rem;
  flex-shrink: 0;
}
.feature-text h4 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}
.feature-text p {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
  line-height: 1.5;
}
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem;
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
}
.toggle-switch {
  width: 50px;
  height: 26px;
  background: var(--color-border);
  border-radius: 100px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 22px;
  height: 22px;
  background: white;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
  box-shadow: var(--shadow-sm);
}
.toggle-switch.active {
  background: var(--color-primary);
}
.toggle-switch.active::after {
  transform: translateX(24px);
}
.toggle-label {
  font-size: 0.95rem;
  font-weight: 500;
}

/* Responsive */
@media (max-width: 1024px) {
  body {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    padding: 2rem;
  }
  .preview-area {
    padding: 2rem;
  }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="url(#logo-gradient)"/>
      <path d="M16 8L24 12V20L16 24L8 20V12L16 8Z" fill="white" fill-opacity="0.9"/>
      <defs>
        <linearGradient id="logo-gradient" x1="0" y1="0" x2="32" y2="32">
          <stop stop-color="#6366f1"/>
          <stop offset="1" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
    </svg>
    AuthFlow
  </div>
  
  <div class="auth-card">
    <div class="auth-header">
      <h1>欢迎回来</h1>
      <p>登录到您的账户继续</p>
    </div>
    
    <form>
      <div class="form-group">
        <label class="form-label">邮箱地址</label>
        <input type="email" class="form-input" placeholder="your@email.com">
      </div>
      
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn-primary">继续</button>
    </form>
    
    <div class="divider"><span>或</span></div>
    
    <div class="social-buttons">
      <button class="btn-social">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        使用 Google 继续
      </button>
      <button class="btn-social">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        使用 GitHub 继续
      </button>
    </div>
    
    <p class="auth-footer">
      还没有账户？ <a href="#">注册</a>
    </p>
  </div>
</aside>

<main class="preview-area">
  <div class="preview-header">
    <h2 class="preview-title">AuthFlow 认证组件</h2>
    <span class="preview-badge">✨ 现代设计</span>
  </div>
  
  <div class="preview-content">
    <div class="feature-showcase">
      <h3>🎯 核心特性</h3>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-icon">🔐</div>
          <div class="feature-text">
            <h4>企业级安全</h4>
            <p>支持 SSO、MFA、RBAC 等企业级安全特性，保护用户数据。</p>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🎨</div>
          <div class="feature-text">
            <h4>完全可定制</h4>
            <p>颜色、Logo、圆角等所有元素都可自定义，完美匹配品牌风格。</p>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🌙</div>
          <div class="feature-text">
            <h4>明暗模式</h4>
            <p>内置明暗主题切换，自动适配系统偏好设置。</p>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">⚡</div>
          <div class="feature-text">
            <h4>极速集成</h4>
            <p>5 分钟快速集成，支持所有主流框架和平台。</p>
          </div>
        </div>
      </div>
    </div>
    
    <div class="theme-toggle">
      <div class="toggle-switch" id="themeToggle"></div>
      <span class="toggle-label">深色模式</span>
    </div>
  </div>
</main>

<script>
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
  themeToggle.classList.toggle('active');
  document.body.setAttribute('data-theme', 
    themeToggle.classList.contains('active') ? 'dark' : 'light'
  );
});
</script>

</body>
</html>
