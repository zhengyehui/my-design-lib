<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<link rel="stylesheet" href="/tokens/tokens.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }

/* Stars */
.stars { position: fixed; inset: 0; }
.star { position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%; animation: twinkle var(--dur) infinite alternate; }
@keyframes twinkle { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 1; transform: scale(1.5); } }

/* Floating elements */
.float { position: absolute; font-size: 2rem; animation: float var(--dur) ease-in-out infinite alternate; opacity: 0.15; }
@keyframes float { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-30px) rotate(10deg); } }

/* Content */
.content { text-align: center; position: relative; z-index: 10; }
.error-code { font-size: clamp(6rem, 15vw, 12rem); font-weight: 900; line-height: 1; background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient-shift 4s ease infinite; background-size: 300% 300%; }
@keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

.error-emoji { font-size: 4rem; margin-bottom: 1rem; animation: spin 8s linear infinite; display: inline-block; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

h1 { font-size: 1.8rem; font-weight: 700; margin: 1rem 0; }
p { color: #888; font-size: 1.1rem; max-width: 400px; line-height: 1.6; margin-bottom: 2rem; }

.actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn { padding: 0.8rem 2rem; border-radius: 12px; font-size: 1rem; font-weight: 600; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
.btn:hover { transform: translateY(-3px); }
.btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
.btn-ghost { border: 1px solid #333; color: #fff; }
.btn-ghost:hover { border-color: #6366f1; }

/* Search */
.search-hint { margin-top: 3rem; color: #555; font-size: 0.9rem; }
.search-hint a { color: #6366f1; text-decoration: none; }

/* Astronaut */
.astronaut { position: absolute; right: 10%; top: 20%; font-size: 5rem; animation: drift 6s ease-in-out infinite alternate; opacity: 0.6; }
@keyframes drift { 0% { transform: translate(0, 0) rotate(-5deg); } 100% { transform: translate(-20px, 30px) rotate(5deg); } }

.planet { position: absolute; left: 8%; bottom: 15%; width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); opacity: 0.3; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.5; } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="astronaut">🧑‍🚀</div>
<div class="planet"></div>

<div class="content">
  <div class="error-emoji">🛸</div>
  <div class="error-code">404</div>
  <h1>页面迷失在太空中</h1>
  <p>你访问的页面可能已被黑洞吞噬，或者从未存在过。别担心，宇宙中还有很多精彩的页面等着你。</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">返回首页</a>
    <a href="javascript:history.back()" class="btn btn-ghost">← 返回上页</a>
  </div>
  <div class="search-hint">
    或者试试 <a href="#">搜索</a> 你想找的内容？
  </div>
</div>

<script>
// Generate stars
const container = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.setProperty('--dur', (1 + Math.random() * 3) + 's');
  star.style.animationDelay = Math.random() * 3 + 's';
  container.appendChild(star);
}

// Floating emojis
const emojis = ['⭐', '🌙', '🪐', '✨', '💫', '☄️', '🌌'];
for (let i = 0; i < 8; i++) {
  const el = document.createElement('div');
  el.className = 'float';
  el.textContent = emojis[i % emojis.length];
  el.style.left = Math.random() * 90 + '%';
  el.style.top = Math.random() * 90 + '%';
  el.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
  el.style.animationDelay = Math.random() * 3 + 's';
  el.style.fontSize = (1 + Math.random() * 2) + 'rem';
  document.body.appendChild(el);
}
</script>

</body>
</html>
