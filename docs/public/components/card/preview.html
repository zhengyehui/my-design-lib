<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>card Preview</title>
<link rel="stylesheet" href="/tokens/tokens.css">
<link rel="stylesheet" href="/components/card/card.css">
<style>
  body { 
    margin: 0; padding: 24px; 
    background: var(--color-bg, #fff); 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
</style>
</head>
<body>
<!-- Card Component — 带悬浮效果的内容卡片 -->
<style>
/* Card.css */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--duration-normal) var(--ease-default);
}

.card:hover {
  border-color: var(--color-border-hover);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

/* ── Variants ───────────────────────── */
.card--flat { box-shadow: none; }
.card--flat:hover { box-shadow: var(--shadow-md); }

.card--glass {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.3);
}

.card--gradient {
  background: linear-gradient(135deg, var(--color-primary-ghost), rgba(6, 182, 212, 0.05));
  border-color: transparent;
}

/* ── Parts ──────────────────────────── */
.card__image {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

.card__body {
  padding: var(--space-6);
}

.card__tag {
  display: inline-block;
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--color-primary);
  background: var(--color-primary-ghost);
  padding: 2px 10px;
  border-radius: var(--radius-full);
  margin-bottom: var(--space-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.card__title {
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  color: var(--color-text);
  margin: 0 0 var(--space-2);
  line-height: var(--leading-tight);
}

.card__desc {
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
  line-height: var(--leading-relaxed);
  margin: 0 0 var(--space-4);
}

.card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-border);
}

.card__meta {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
</style>

<!-- Demo: Card 组件 -->
<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:24px;">

  <!-- Card 1: 带图片 -->
  <div class="card">
    <img class="card__image" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&h=340&fit=crop" alt="Abstract gradient"></img>
    <div class="card__body">
      <span class="card__tag">设计系统</span>
      <h3 class="card__title">构建一致的 UI 体验</h3>
      <p class="card__desc">通过设计 Token 和可复用组件，让团队在不同产品中保持视觉统一。</p>
    </div>
    <div class="card__footer">
      <span class="card__meta">5 min read</span>
      <a href="#" style="color:var(--color-primary); font-size:var(--text-sm); font-weight:var(--weight-medium); text-decoration:none;">了解更多 →</a>
    </div>
  </div>

  <!-- Card 2: 纯内容 -->
  <div class="card card--flat">
    <div class="card__body">
      <span class="card__tag">前端</span>
      <h3 class="card__title">CSS 变量的最佳实践</h3>
      <p class="card__desc">用 Design Tokens 管理颜色、间距、字体，一次修改全局生效。支持暗色模式无缝切换。</p>
    </div>
  </div>

  <!-- Card 3: 渐变背景 -->
  <div class="card card--gradient">
    <div class="card__body">
      <h3 class="card__title" style="font-size:var(--text-2xl);">🚀 快速原型</h3>
      <p class="card__desc">复制粘贴即可使用，零依赖、纯 HTML + CSS。AI 可以直接读取组件代码生成页面。</p>
    </div>
  </div>

</div>
</body>
</html>
