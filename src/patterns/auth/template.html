<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Sign In · My Design Lib</title>
<link rel="stylesheet" href="http://101.37.166.208:11930/tokens/tokens.css">
<style>
  body {
    margin: 0; min-height: 100vh;
    background:
      radial-gradient(circle at 20% 20%, rgba(99,102,241,0.35), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(6,182,212,0.35), transparent 40%),
      var(--color-bg);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); color: var(--color-text); padding: var(--space-6);
  }
  .card {
    width: 100%; max-width: 420px;
    padding: var(--space-8);
    background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
  }
  h1 { margin: 0 0 var(--space-2); font-size: var(--text-3xl); }
  .sub { color: var(--color-text-secondary); font-size: var(--text-sm); margin: 0 0 var(--space-6); }
  label { display: block; margin-bottom: var(--space-4); }
  label span { display: block; font-size: var(--text-sm); font-weight: 500; margin-bottom: var(--space-1); color: var(--color-text-secondary); }
  input {
    width: 100%; box-sizing: border-box; padding: 10px var(--space-3);
    border: 1px solid var(--color-border); border-radius: var(--radius-md);
    font-size: var(--text-base); font-family: inherit; color: inherit; background: var(--color-surface);
  }
  input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-ghost); }
  .submit {
    width: 100%; padding: 12px; border: none; border-radius: var(--radius-md);
    background: var(--color-primary); color: var(--color-text-inverse);
    font-weight: 600; cursor: pointer; margin-top: var(--space-2);
  }
  .alert {
    padding: var(--space-2) var(--space-3); background: rgba(239,68,68,0.1); color: var(--color-danger);
    border-radius: var(--radius-sm); font-size: var(--text-sm); margin-bottom: var(--space-4); display: none;
  }
  .footer { text-align: center; margin-top: var(--space-4); color: var(--color-text-secondary); font-size: var(--text-sm); }
  .footer a { color: var(--color-primary); text-decoration: none; }
</style>
</head>
<body>
<form class="card">
  <h1>欢迎回来</h1>
  <p class="sub">登录你的账户继续</p>
  <div class="alert">邮箱或密码错误</div>
  <label><span>邮箱</span><input type="email" placeholder="you@example.com" required /></label>
  <label><span>密码</span><input type="password" placeholder="••••••••" required /></label>
  <button class="submit" type="submit">登录</button>
  <p class="footer">还没有账号?<a href="#">注册一个</a></p>
</form>
</body>
</html>
