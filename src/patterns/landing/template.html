<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Landing Page · My Design Lib</title>
<link rel="stylesheet" href="http://101.37.166.208:11930/tokens/tokens.css">
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); font-family: var(--font-sans); }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 var(--space-6); }
  nav {
    position: sticky; top: 0; z-index: var(--z-sticky);
    backdrop-filter: blur(12px); background: rgba(255,255,255,0.7);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-3) 0;
  }
  nav .inner { display: flex; justify-content: space-between; align-items: center; }
  nav .logo { font-weight: var(--weight-bold); color: var(--color-primary); font-size: var(--text-lg); }
  nav a { color: var(--color-text-secondary); text-decoration: none; margin: 0 var(--space-3); font-size: var(--text-sm); }

  .hero { text-align: center; padding: var(--space-24) 0 var(--space-16); position: relative; }
  .hero h1 { font-size: var(--text-5xl); margin: 0 0 var(--space-4); font-weight: var(--weight-bold); letter-spacing: -0.03em; }
  .hero h1 .grad {
    background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
    -webkit-background-clip: text; color: transparent;
  }
  .hero p { font-size: var(--text-xl); color: var(--color-text-secondary); max-width: 680px; margin: 0 auto var(--space-8); }
  .btn {
    display: inline-block; padding: 14px 32px; border-radius: var(--radius-md);
    background: var(--color-primary); color: var(--color-text-inverse);
    text-decoration: none; font-weight: var(--weight-medium); margin: 0 var(--space-2);
  }
  .btn--ghost { background: transparent; color: var(--color-text); border: 1px solid var(--color-border); }

  .features { padding: var(--space-16) 0; }
  .features h2 { text-align: center; font-size: var(--text-3xl); margin-bottom: var(--space-12); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-6); }
  .card {
    padding: var(--space-6); border-radius: var(--radius-lg);
    background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: var(--shadow-md);
  }
  .card h3 { margin: 0 0 var(--space-2); font-size: var(--text-xl); }
  .card p { margin: 0; color: var(--color-text-secondary); font-size: var(--text-sm); }
  .card .icon { font-size: 32px; margin-bottom: var(--space-3); }

  footer { padding: var(--space-8) 0; border-top: 1px solid var(--color-border); text-align: center; color: var(--color-text-muted); font-size: var(--text-sm); }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: var(--text-4xl); }
  }
</style>
</head>
<body>
<nav><div class="container inner"><span class="logo">MyApp</span><div><a href="#">功能</a><a href="#">价格</a><a href="#">文档</a><a class="btn" href="#">开始使用</a></div></div></nav>

<section class="hero container">
  <h1>打造 <span class="grad">下一代</span> 产品体验</h1>
  <p>一个为现代团队设计的协作平台,让创意从想法到落地只需几分钟。</p>
  <a class="btn" href="#">免费开始</a>
  <a class="btn btn--ghost" href="#">查看演示</a>
</section>

<section class="features container">
  <h2>核心能力</h2>
  <div class="grid">
    <div class="card"><div class="icon">⚡</div><h3>极速响应</h3><p>毫秒级延迟,全球 CDN 加速,体验流畅如本地。</p></div>
    <div class="card"><div class="icon">🔐</div><h3>企业级安全</h3><p>端到端加密,SOC2 合规,数据永远属于你。</p></div>
    <div class="card"><div class="icon">🧩</div><h3>开放集成</h3><p>支持 100+ 第三方服务,API 优先,不被锁定。</p></div>
  </div>
</section>

<footer class="container">© 2026 MyApp · Built with My Design Lib</footer>
</body>
</html>
