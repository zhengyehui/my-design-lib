<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Pricing · My Design Lib</title>
<link rel="stylesheet" href="http://101.37.166.208:11930/tokens/tokens.css">
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text); font-family: var(--font-sans); }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 var(--space-6); }
  header { padding: var(--space-16) 0 var(--space-8); text-align: center; }
  header h1 { font-size: var(--text-4xl); margin: 0 0 var(--space-3); }
  header p { color: var(--color-text-secondary); max-width: 560px; margin: 0 auto; font-size: var(--text-lg); }

  .tiers { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); padding: 0 0 var(--space-16); }
  .tier {
    padding: var(--space-8) var(--space-6);
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-xl); display: flex; flex-direction: column; gap: var(--space-4);
  }
  .tier--featured {
    border: 2px solid transparent;
    background:
      linear-gradient(var(--color-surface), var(--color-surface)) padding-box,
      linear-gradient(135deg, var(--color-primary), var(--color-secondary)) border-box;
    box-shadow: var(--shadow-xl); transform: scale(1.03);
  }
  .badge {
    align-self: flex-start; padding: 2px 10px; border-radius: var(--radius-full);
    background: var(--color-primary); color: #fff; font-size: var(--text-xs); font-weight: 600;
  }
  .tier h3 { margin: 0; font-size: var(--text-lg); color: var(--color-text-secondary); font-weight: 500; }
  .price { font-size: var(--text-5xl); font-weight: 700; letter-spacing: -0.02em; }
  .price small { font-size: var(--text-lg); color: var(--color-text-muted); font-weight: 400; }
  ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-2); }
  li { display: flex; gap: var(--space-2); font-size: var(--text-sm); }
  li::before { content: "✓"; color: var(--color-success); font-weight: 700; }
  .btn { text-align: center; padding: 12px; border-radius: var(--radius-md); text-decoration: none; font-weight: 600; cursor: pointer; border: 1px solid var(--color-border); color: var(--color-text); background: transparent; }
  .btn--primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
  @media (max-width: 900px) { .tiers { grid-template-columns: 1fr; } .tier--featured { transform: none; } }
</style>
</head>
<body>
<header class="container">
  <h1>简单透明的定价</h1>
  <p>选择适合你规模的方案,随时升级或降级,按月计费,无隐藏费用。</p>
</header>
<div class="tiers container">
  <div class="tier">
    <h3>Starter</h3>
    <div class="price">¥0<small>/月</small></div>
    <ul><li>3 个项目</li><li>1GB 存储</li><li>社区支持</li></ul>
    <a class="btn" href="#">免费开始</a>
  </div>
  <div class="tier tier--featured">
    <span class="badge">最受欢迎</span>
    <h3>Pro</h3>
    <div class="price">¥99<small>/月</small></div>
    <ul><li>无限项目</li><li>100GB 存储</li><li>优先工单支持</li><li>高级分析</li><li>团队协作</li></ul>
    <a class="btn btn--primary" href="#">升级 Pro</a>
  </div>
  <div class="tier">
    <h3>Enterprise</h3>
    <div class="price">联系我们</div>
    <ul><li>定制额度</li><li>私有部署</li><li>专属客户成功</li><li>SLA 99.99%</li></ul>
    <a class="btn" href="#">预约咨询</a>
  </div>
</div>
</body>
</html>
