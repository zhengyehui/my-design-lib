<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Dashboard · My Design Lib</title>
<link rel="stylesheet" href="http://101.37.166.208:11930/tokens/tokens.css">
<style>
  body { margin: 0; background: var(--color-bg-subtle); color: var(--color-text); font-family: var(--font-sans); }
  nav { background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: var(--space-3) var(--space-6); display: flex; justify-content: space-between; align-items: center; }
  nav .logo { font-weight: var(--weight-bold); color: var(--color-primary); }
  nav .actions { display: flex; gap: var(--space-3); align-items: center; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
  main { padding: var(--space-6); max-width: 1400px; margin: 0 auto; }
  h1 { font-size: var(--text-2xl); margin: 0 0 var(--space-6); }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); margin-bottom: var(--space-8); }
  .stat {
    background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
    padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-2);
  }
  .stat .label { color: var(--color-text-secondary); font-size: var(--text-sm); }
  .stat .value { font-size: var(--text-3xl); font-weight: 700; }
  .stat .trend { font-size: var(--text-sm); color: var(--color-success); }
  .stat .trend--down { color: var(--color-danger); }
  .table-wrap { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
  .table-wrap h2 { margin: 0; padding: var(--space-4) var(--space-6); border-bottom: 1px solid var(--color-border); font-size: var(--text-lg); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: var(--space-3) var(--space-6); text-align: left; font-size: var(--text-sm); }
  thead { background: var(--color-bg-subtle); color: var(--color-text-secondary); text-transform: uppercase; font-size: var(--text-xs); letter-spacing: 0.05em; }
  tbody tr { border-top: 1px solid var(--color-border); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 500; }
  .badge--success { background: rgba(16,185,129,0.1); color: var(--color-success); }
  .badge--warning { background: rgba(245,158,11,0.1); color: var(--color-warning); }
  @media (max-width: 768px) { .stats { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<nav>
  <span class="logo">AdminHub</span>
  <div class="actions">
    <span style="color:var(--color-text-secondary);font-size:var(--text-sm);">🔔</span>
    <div class="avatar">W</div>
  </div>
</nav>
<main>
  <h1>概览</h1>
  <div class="stats">
    <div class="stat"><span class="label">总用户</span><span class="value">12,483</span><span class="trend">↑ 12.5%</span></div>
    <div class="stat"><span class="label">本月营收</span><span class="value">¥84,392</span><span class="trend">↑ 8.2%</span></div>
    <div class="stat"><span class="label">活跃订单</span><span class="value">238</span><span class="trend">↑ 3.1%</span></div>
    <div class="stat"><span class="label">跳出率</span><span class="value">34.8%</span><span class="trend trend--down">↓ 2.1%</span></div>
  </div>
  <div class="table-wrap">
    <h2>最新订单</h2>
    <table>
      <thead><tr><th>订单号</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
      <tbody>
        <tr><td>#A88201</td><td>张三</td><td>¥299</td><td><span class="badge badge--success">已支付</span></td><td>2026-04-19 10:23</td></tr>
        <tr><td>#A88200</td><td>李四</td><td>¥1,280</td><td><span class="badge badge--warning">待发货</span></td><td>2026-04-19 09:41</td></tr>
        <tr><td>#A88199</td><td>王五</td><td>¥499</td><td><span class="badge badge--success">已支付</span></td><td>2026-04-19 08:15</td></tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
