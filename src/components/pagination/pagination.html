<!-- Pagination Component — 分页组件,默认 / 紧凑两种 -->
<style>
.pagination {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-family: var(--font-sans);
}

.pagination__item {
  min-width: 36px;
  height: 36px;
  padding: 0 var(--space-2);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  cursor: pointer;
  user-select: none;
  transition: all var(--duration-fast) var(--ease-default);
  font-variant-numeric: tabular-nums;
}
.pagination__item:hover:not(.pagination__item--disabled):not(.pagination__item--active) {
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.pagination__item--active {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: var(--color-text-inverse);
}
.pagination__item--disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.pagination__ellipsis {
  min-width: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
}

/* variant: compact */
.pagination--compact .pagination__item { min-width: 32px; height: 32px; font-size: var(--text-xs); }
.pagination--compact .pagination__info {
  padding: 0 var(--space-3);
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
}
</style>

<!-- variant: default -->
<nav class="pagination" aria-label="分页">
  <button class="pagination__item pagination__item--disabled" aria-label="上一页">‹</button>
  <button class="pagination__item pagination__item--active" aria-current="page">1</button>
  <button class="pagination__item">2</button>
  <button class="pagination__item">3</button>
  <span class="pagination__ellipsis">…</span>
  <button class="pagination__item">12</button>
  <button class="pagination__item" aria-label="下一页">›</button>
</nav>
<!-- /variant -->

<!-- variant: compact -->
<nav class="pagination pagination--compact" aria-label="分页">
  <button class="pagination__item">‹</button>
  <span class="pagination__info">第 <strong>4</strong> / <strong>12</strong> 页</span>
  <button class="pagination__item">›</button>
</nav>
<!-- /variant -->
