<!-- Alert Component — 4 variants: info, success, warning, danger -->
<style>
/* Alert.css */
.alert {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-4);
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--color-text);
  background: var(--color-bg);
  box-shadow: var(--shadow-sm);
  transition: all var(--duration-normal) var(--ease-default);
  position: relative;
  overflow: hidden;
}

.alert:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
}

/* ── 图标 ──────────────────────────── */
.alert__icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── 内容区域 ──────────────────────────── */
.alert__content {
  flex: 1;
  min-width: 0;
}

.alert__title {
  font-weight: var(--weight-semibold);
  margin: 0 0 var(--space-1) 0;
  color: var(--color-text);
}

.alert__description {
  margin: 0;
  color: var(--color-text-secondary);
}

/* ── 关闭按钮 ──────────────────────────── */
.alert__close {
  background: none;
  border: none;
  padding: var(--space-1);
  cursor: pointer;
  color: var(--color-text-muted);
  border-radius: var(--radius-sm);
  transition: all var(--duration-fast) var(--ease-default);
  flex-shrink: 0;
}

.alert__close:hover {
  background: var(--color-bg-muted);
  color: var(--color-text);
}

.alert__close svg {
  width: 16px;
  height: 16px;
  display: block;
}

/* ── 变体样式 ──────────────────────────── */
.alert--info {
  background: rgba(59, 130, 246, 0.08);
  border-color: rgba(59, 130, 246, 0.2);
  color: #1e40af;
}

.alert--info .alert__icon {
  color: var(--color-info);
}

.alert--info .alert__title {
  color: #1e40af;
}

.alert--info .alert__description {
  color: #3b82f6;
}

.alert--success {
  background: rgba(16, 185, 129, 0.08);
  border-color: rgba(16, 185, 129, 0.2);
  color: #065f46;
}

.alert--success .alert__icon {
  color: var(--color-success);
}

.alert--success .alert__title {
  color: #065f46;
}

.alert--success .alert__description {
  color: #10b981;
}

.alert--warning {
  background: rgba(245, 158, 11, 0.08);
  border-color: rgba(245, 158, 11, 0.2);
  color: #92400e;
}

.alert--warning .alert__icon {
  color: var(--color-warning);
}

.alert--warning .alert__title {
  color: #92400e;
}

.alert--warning .alert__description {
  color: #f59e0b;
}

.alert--danger {
  background: rgba(239, 68, 68, 0.08);
  border-color: rgba(239, 68, 68, 0.2);
  color: #991b1b;
}

.alert--danger .alert__icon {
  color: var(--color-danger);
}

.alert--danger .alert__title {
  color: #991b1b;
}

.alert--danger .alert__description {
  color: #ef4444;
}

/* ── 暗黑模式适配 ──────────────────────────── */
[data-theme="dark"] .alert {
  background: var(--color-surface);
  color: var(--color-text);
  box-shadow: var(--shadow-md);
}

[data-theme="dark"] .alert__title {
  color: var(--color-text);
}

[data-theme="dark"] .alert__description {
  color: var(--color-text-secondary);
}

[data-theme="dark"] .alert--info {
  background: rgba(59, 130, 246, 0.15);
  border-color: rgba(59, 130, 246, 0.3);
  color: #93c5fd;
}

[data-theme="dark"] .alert--info .alert__title {
  color: #93c5fd;
}

[data-theme="dark"] .alert--info .alert__description {
  color: #60a5fa;
}

[data-theme="dark"] .alert--success {
  background: rgba(16, 185, 129, 0.15);
  border-color: rgba(16, 185, 129, 0.3);
  color: #6ee7b7;
}

[data-theme="dark"] .alert--success .alert__title {
  color: #6ee7b7;
}

[data-theme="dark"] .alert--success .alert__description {
  color: #34d399;
}

[data-theme="dark"] .alert--warning {
  background: rgba(245, 158, 11, 0.15);
  border-color: rgba(245, 158, 11, 0.3);
  color: #fcd34d;
}

[data-theme="dark"] .alert--warning .alert__title {
  color: #fcd34d;
}

[data-theme="dark"] .alert--warning .alert__description {
  color: #fbbf24;
}

[data-theme="dark"] .alert--danger {
  background: rgba(239, 68, 68, 0.15);
  border-color: rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}

[data-theme="dark"] .alert--danger .alert__title {
  color: #fca5a5;
}

[data-theme="dark"] .alert--danger .alert__description {
  color: #f87171;
}
</style>

<!-- Demo: Alert 组件 -->
