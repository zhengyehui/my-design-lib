<!-- Empty State Component — 空数据占位 + 可选 CTA -->
<style>
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  padding: var(--space-12) var(--space-6);
  text-align: center;
  font-family: var(--font-sans);
  color: var(--color-text-secondary);
  background: var(--color-bg-subtle);
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-lg);
  min-height: 280px;
}

.empty-state__icon {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-full);
  background: var(--color-bg-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: var(--color-text-muted);
  margin-bottom: var(--space-2);
}

.empty-state__title {
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  color: var(--color-text);
  margin: 0;
}

.empty-state__desc {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  max-width: 360px;
  margin: 0;
  line-height: var(--leading-relaxed);
}

.empty-state__actions {
  display: flex;
  gap: var(--space-2);
  margin-top: var(--space-3);
}

[data-theme="dark"] .empty-state { background: var(--color-surface); }
</style>

<!-- variant: default -->
<div class="empty-state">
  <div class="empty-state__icon">📭</div>
  <h3 class="empty-state__title">还没有任何数据</h3>
  <p class="empty-state__desc">创建第一条记录后,它会显示在这里。</p>
</div>
<!-- /variant -->

<!-- variant: with-cta -->
<div class="empty-state">
  <div class="empty-state__icon">🚀</div>
  <h3 class="empty-state__title">开始你的第一个项目</h3>
  <p class="empty-state__desc">创建一个项目来管理任务、成员和进度。只需 30 秒即可完成。</p>
  <div class="empty-state__actions">
    <button class="btn btn--primary btn--md" style="padding:10px 22px;border-radius:var(--radius-md);background:var(--color-primary);color:#fff;border:none;cursor:pointer;">新建项目</button>
    <button class="btn btn--ghost btn--md" style="padding:10px 22px;border-radius:var(--radius-md);background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border);cursor:pointer;">查看示例</button>
  </div>
</div>
<!-- /variant -->
