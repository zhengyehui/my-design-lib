<!-- Kbd Component — 键盘按键样式,single / combo -->
<style>
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--color-text-secondary);
  background: var(--color-bg-muted);
  border: 1px solid var(--color-border);
  border-bottom-width: 2px;
  border-radius: var(--radius-sm);
  line-height: 1;
  white-space: nowrap;
}

.kbd-combo {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
}
.kbd-combo .kbd { margin: 0; }
.kbd-combo__plus { color: var(--color-text-muted); font-size: var(--text-xs); }

[data-theme="dark"] .kbd {
  background: var(--color-surface);
  border-color: var(--color-border);
}
</style>

<!-- variant: single -->
<kbd class="kbd">⌘</kbd>
<kbd class="kbd">K</kbd>
<kbd class="kbd">Esc</kbd>
<kbd class="kbd">↵</kbd>
<!-- /variant -->

<!-- variant: combo -->
<span class="kbd-combo">
  <kbd class="kbd">⌘</kbd>
  <span class="kbd-combo__plus">+</span>
  <kbd class="kbd">Shift</kbd>
  <span class="kbd-combo__plus">+</span>
  <kbd class="kbd">P</kbd>
</span>

<span class="kbd-combo" style="margin-left:16px;">
  按
  <kbd class="kbd">G</kbd>
  然后
  <kbd class="kbd">U</kbd>
  跳转到用户页
</span>
<!-- /variant -->
