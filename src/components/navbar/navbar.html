<!-- Navbar Component — 响应式导航栏，3种变体: default/transparent/glass -->
<style>
/* Navbar.css */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  font-family: var(--font-sans);
  font-weight: var(--weight-medium);
  transition: all var(--duration-normal) var(--ease-default);
  position: relative;
  z-index: var(--z-sticky);
}

/* ── 变体 ──────────────────────────── */
.navbar--default {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
}

.navbar--transparent {
  background: transparent;
  border-bottom: none;
}

.navbar--glass {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: var(--shadow-sm);
}

/* ── Logo ──────────────────────────── */
.navbar__logo {
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  color: var(--color-primary);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.navbar__logo:hover {
  opacity: 0.9;
}

/* ── 导航链接 ──────────────────────── */
.navbar__links {
  display: flex;
  align-items: center;
  gap: var(--space-6);
  list-style: none;
  margin: 0;
  padding: 0;
}

.navbar__link {
  color: var(--color-text-secondary);
  text-decoration: none;
  font-size: var(--text-base);
  transition: color var(--duration-fast) var(--ease-default);
  position: relative;
}

.navbar__link:hover {
  color: var(--color-primary);
}

.navbar__link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--color-primary);
  transition: width var(--duration-fast) var(--ease-default);
}

.navbar__link:hover::after {
  width: 100%;
}

/* ── 按钮组 ────────────────────────── */
.navbar__actions {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.navbar__btn {
  padding: 8px 16px;
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-default);
  border: none;
  background: transparent;
  color: var(--color-text-secondary);
}

.navbar__btn:hover {
  background: var(--color-bg-muted);
  color: var(--color-text);
}

.navbar__btn--primary {
  background: var(--color-primary);
  color: var(--color-text-inverse);
}

.navbar__btn--primary:hover {
  background: var(--color-primary-dark);
  transform: translateY(-1px);
}

/* ── 移动端菜单按钮 ────────────────── */
.navbar__toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-2);
}

.navbar__toggle-icon {
  width: 24px;
  height: 24px;
  stroke: var(--color-text);
}

/* ── 响应式设计 ────────────────────── */
@media (max-width: 768px) {
  .navbar__links {
    display: none;
  }
  
  .navbar__toggle {
    display: block;
  }
  
  .navbar__actions {
    display: none;
  }
  
  .navbar__links--mobile {
    display: flex;
    flex-direction: column;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4);
    box-shadow: var(--shadow-lg);
    z-index: var(--z-dropdown);
  }
  
  .navbar__links--mobile .navbar__link {
    padding: var(--space-3) 0;
    border-bottom: 1px solid var(--color-border);
  }
  
  .navbar__links--mobile .navbar__link:last-child {
    border-bottom: none;
  }
}
</style>
