name: Deploy Design Lib

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            rm -rf /var/www/design-lib/*
            mkdir -p /var/www/design-lib
            cd /tmp && rm -f design-lib-dist.tar.gz
            echo "Deploy ready — upload dist manually or use scp"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-lib-dist
          path: docs/.vitepress/dist/
          retention-days: 7
